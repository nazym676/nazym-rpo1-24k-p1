{% extends "base.html" %}

{% block title %}Search{% endblock %}

{% block content %}
<section class="news-block">
            <div class="container-fluid">
                <div class="news-content">
                    <h3>Search news</h3>
                    <form action="{% url 'search_results' %}" method="get">
                        <label for="search">Enter news title or description</label>
                        <input id="search" name="q" type="text" placeholder="Title or Description" required>
                        <button type="submit">Search</button>
                    </form>
                </div>

                  <div class="adv-content">
                    <h3>Advertising</h3>
                    <div class="adv-card">
                        {% for adv in advs %}
                        <img src="{{ adv.image_url }}" alt="{{ adv.name }}" class="adv-img">
                        {% endfor %}
                    </div>
                </div>


            </div>
        </section>
{% endblock %}
